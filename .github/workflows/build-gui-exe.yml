name: Build GUI Tool EXE
on:
  push:
    branches: [main]
    paths:
      - "quran-reciter-id/desktop/**"
      - ".github/workflows/build-gui-exe.yml"
  workflow_dispatch:
env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"
jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install ffmpeg
        run: choco install ffmpeg -y --no-progress
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas openpyxl numpy scipy librosa yt-dlp requests
      - name: Patch source (Windows EXE fixes)
        working-directory: quran-reciter-id/desktop
        shell: pwsh
        run: |
          $f = 'reciter_gui.py'
          $c = Get-Content -Raw -Encoding UTF8 $f
          # Fix 1: ProcessPoolExecutor -> ThreadPoolExecutor (fixes 10 windows opening on Windows EXE)
          $c = $c -replace 'ProcessPoolExecutor', 'ThreadPoolExecutor'
          # Fix 2: remove source_address 0.0.0.0 (causes Errno 22 Invalid argument on Windows)
          $c = $c -replace '(?m)^\s*"source_address":\s*"0\.0\.0\.0",\s*?
', ''
          Set-Content -Path $f -Value $c -Encoding UTF8 -NoNewline
          Write-Host "=== Patch verification ==="
          if ($c -match 'ProcessPoolExecutor') { Write-Error "FAIL: ProcessPoolExecutor still present" }
          if ($c -match 'source_address') { Write-Error "FAIL: source_address still present" }
          Write-Host "OK: both fixes applied"
      - name: Build EXE
        working-directory: quran-reciter-id/desktop
        shell: cmd
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "MnAlqari-Tool" --hidden-import=librosa --hidden-import=scipy.ndimage --collect-all librosa --collect-all yt_dlp reciter_gui.py
      - uses: actions/upload-artifact@v4
        with:
          name: MnAlqari-Tool-Windows
          path: quran-reciter-id/desktop/dist/MnAlqari-Tool.exe
          if-no-files-found: error
