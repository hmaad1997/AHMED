name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: quran-reciter-id/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.1.0 torchaudio==2.1.0
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name quran-reciter-backend --collect-all speechbrain --collect-all librosa --collect-all faiss --collect-data sklearn run_server.py

      - uses: actions/upload-artifact@v4
        with:
          name: quran-reciter-backend-exe
          path: quran-reciter-id/backend/dist/quran-reciter-backend.exe
          if-no-files-found: error
