name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: quran-reciter-id/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.1.0 torchaudio==2.1.0
          pip install -r requirements.txt
          pip install pyinstaller pywebview
      - name: Build EXE (windowed, no CMD)
        run: |
          pyinstaller --onefile --noconsole --name QuranReciterID `
            --collect-all app `
            --collect-all speechbrain --collect-all librosa `
            --collect-all faiss --collect-data sklearn `
            --collect-all webview --collect-all uvicorn `
            launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: QuranReciterID-exe
          path: quran-reciter-id/backend/dist/QuranReciterID.exe
          if-no-files-found: error
