name: Build EXE
on:
  push: { branches: [main] }
  workflow_dispatch:
env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: '1'
jobs:
  backend-exe:
    runs-on: windows-latest
    timeout-minutes: 300
    defaults: { run: { working-directory: quran-reciter-id/backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Install ffmpeg
        run: choco install ffmpeg -y --no-progress
        working-directory: .
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.1.0 torchaudio==2.1.0
          pip install -r requirements.txt
          pip install pyinstaller pywebview
      - name: Pre-download SpeechBrain models
        run: python download_models.py
      - name: Smoke test - fingerprint pipeline (single reciter)
        run: python smoke_test.py
      - name: Build pretrained reciter database
        run: python scripts/build_pretrained_db.py
      - name: Enrich from open-source Quran APIs
        continue-on-error: true
        timeout-minutes: 60
        run: python scripts/enrich_from_mp3quran.py
      - name: Enrich from HF quran-reciters-8sec-dataset
        continue-on-error: true
        timeout-minutes: 90
        run: python scripts/enrich_from_hf.py
      - name: Enrich from streaming datasets
        continue-on-error: true
        timeout-minutes: 60
        env: { HF_SAMPLES: '3', HF_MAX_ROWS: '5000' }
        run: python scripts/enrich_streaming_datasets.py
      - name: Enrich from YouTube for missing Excel reciters
        continue-on-error: true
        timeout-minutes: 90
        env:
          YT_PER_RECITER: '2'
          YT_CLIP_SECONDS: '60'
          QURAN_EXCEL: 'data/reciters.xlsx'
        run: python scripts/enrich_from_youtube.py
      - name: Upload YouTube enrichment report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-enrichment-report
          path: |
            quran-reciter-id/backend/data/youtube_enrichment_report.json
            quran-reciter-id/backend/data/youtube_enrichment_report.csv
          if-no-files-found: warn
      - name: Verify bundled fingerprint database
        run: python verify_bundle.py
      - name: Ensure data folder exists
        run: if (!(Test-Path data)) { New-Item -ItemType Directory -Path data | Out-Null }
      - name: Build EXE
        shell: pwsh
        run: ./build_exe.ps1
      - name: Smoke test - EXE boots and /health responds
        shell: pwsh
        run: ./smoke_exe.ps1
      - name: Upload smoke EXE log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-exe-log
          path: quran-reciter-id/backend/smoke_exe_backend.log
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: QuranReciterID-exe
          path: quran-reciter-id/backend/dist/QuranReciterID.exe
          if-no-files-found: error
