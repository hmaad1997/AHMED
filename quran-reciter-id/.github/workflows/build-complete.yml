name: Build Complete Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-all:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    # Build Flutter App
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Enable Windows Desktop
      run: flutter config --enable-windows-desktop
    
    - name: Install Flutter dependencies
      working-directory: ./flutter_app
      run: flutter pub get
    
    - name: Build Windows App
      working-directory: ./flutter_app
      run: flutter build windows --release
    
    # Build Backend
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Backend
      working-directory: ./backend
      run: |
        pyinstaller --onefile --name backend-server run_server.py
    
    # Package Everything
    - name: Create Complete Package
      run: |
        mkdir QuranReciterID
        
        REM Copy Flutter App
        xcopy /E /I /Y flutter_app\build\windows\x64\runner\Release\* QuranReciterID\app\
        
        REM Copy Backend
        mkdir QuranReciterID\backend
        copy backend\dist\backend-server.exe QuranReciterID\backend\
        xcopy /E /I /Y backend\data QuranReciterID\backend\data\
        
        REM Create Start Script
        echo @echo off > QuranReciterID\START.bat
        echo echo ============================================ >> QuranReciterID\START.bat
        echo echo   Quran Reciter ID - Starting... >> QuranReciterID\START.bat
        echo echo ============================================ >> QuranReciterID\START.bat
        echo. >> QuranReciterID\START.bat
        echo echo Starting Backend Server... >> QuranReciterID\START.bat
        echo start /B backend\backend-server.exe >> QuranReciterID\START.bat
        echo. >> QuranReciterID\START.bat
        echo echo Waiting for backend to start... >> QuranReciterID\START.bat
        echo timeout /t 5 /nobreak ^>nul >> QuranReciterID\START.bat
        echo. >> QuranReciterID\START.bat
        echo echo Starting Desktop App... >> QuranReciterID\START.bat
        echo start app\quran_reciter_id.exe >> QuranReciterID\START.bat
        echo. >> QuranReciterID\START.bat
        echo echo Application started! >> QuranReciterID\START.bat
        echo pause >> QuranReciterID\START.bat
        
        REM Create README
        echo # Quran Reciter ID > QuranReciterID\README.txt
        echo. >> QuranReciterID\README.txt
        echo ## How to Run: >> QuranReciterID\README.txt
        echo 1. Double-click START.bat >> QuranReciterID\README.txt
        echo 2. Wait for the application to open >> QuranReciterID\README.txt
        echo 3. Enjoy! >> QuranReciterID\README.txt
    
    - name: Create ZIP Archive
      run: |
        powershell Compress-Archive -Path QuranReciterID\* -DestinationPath QuranReciterID-Windows-Complete.zip
    
    - name: Upload Complete Package
      uses: actions/upload-artifact@v3
      with:
        name: QuranReciterID-Complete-Package
        path: QuranReciterID-Windows-Complete.zip
        retention-days: 90
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: QuranReciterID-Windows-Complete.zip
        body: |
          # Quran Reciter ID - Windows Desktop App
          
          ## التحميل والتشغيل:
          
          1. حمّل ملف `QuranReciterID-Windows-Complete.zip`
          2. فك الضغط
          3. شغّل `START.bat`
          4. استمتع! 🎉
          
          ## المحتويات:
          - ✅ تطبيق Windows Desktop
          - ✅ Backend Server
          - ✅ قاعدة بيانات 50 قارئ
          - ✅ جميع المكتبات المطلوبة
          
          ## المتطلبات:
          - Windows 10 أو أحدث
          - لا حاجة لتثبيت أي شيء آخر!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
