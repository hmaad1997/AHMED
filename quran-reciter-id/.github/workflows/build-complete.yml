name: Build Complete Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-all:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ---------- Flutter ----------
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'

    - name: Enable Windows Desktop
      run: flutter config --enable-windows-desktop

    - name: Install Flutter dependencies
      working-directory: ./quran-reciter-id/flutter_app
      run: flutter pub get

    - name: Build Windows App
      working-directory: ./quran-reciter-id/flutter_app
      run: flutter build windows --release

    # ---------- Python ----------
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      working-directory: ./quran-reciter-id/backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller huggingface_hub requests tqdm

    # ---------- Pre-built fingerprints DB ----------
    - name: Build pre-trained fingerprints DB (Hugging Face)
      working-directory: ./quran-reciter-id/backend
      continue-on-error: true
      run: python scripts/build_pretrained_db.py

    - name: Enrich fingerprints from open sources (mp3quran + everyayah)
      working-directory: ./quran-reciter-id/backend
      continue-on-error: true
      run: python scripts/enrich_from_mp3quran.py

    # ---------- PyInstaller ----------
    - name: Build Backend EXE (windowed launcher)
      working-directory: ./quran-reciter-id/backend
      run: |
        pyinstaller --onefile --noconsole --name QuranReciterID `
          --add-data "data;data" `
          --add-data "app;app" `
          launcher.py

    # ---------- Package ----------
    - name: Create Complete Package
      shell: cmd
      run: |
        mkdir QuranReciterID
        xcopy /E /I /Y quran-reciter-id\flutter_app\build\windows\x64\runner\Release\* QuranReciterID\app\
        mkdir QuranReciterID\backend
        copy quran-reciter-id\backend\dist\QuranReciterID.exe QuranReciterID\backend\
        xcopy /E /I /Y quran-reciter-id\backend\data QuranReciterID\backend\data\
        echo @echo off > QuranReciterID\START.bat
        echo start "" backend\QuranReciterID.exe >> QuranReciterID\START.bat
        echo timeout /t 8 /nobreak ^>nul >> QuranReciterID\START.bat
        echo start "" app\quran_reciter_id.exe >> QuranReciterID\START.bat

    - name: Create ZIP Archive
      run: powershell Compress-Archive -Path QuranReciterID\* -DestinationPath QuranReciterID-Windows-Complete.zip

    - name: Upload Complete Package
      uses: actions/upload-artifact@v3
      with:
        name: QuranReciterID-Complete-Package
        path: QuranReciterID-Windows-Complete.zip
        retention-days: 90

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: QuranReciterID-Windows-Complete.zip
        body: |
          # Quran Reciter ID - Windows Desktop
          حمّل الـ ZIP، فك الضغط، وشغّل START.bat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
