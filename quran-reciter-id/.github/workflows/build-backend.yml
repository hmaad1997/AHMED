name: Build Backend Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Backend with PyInstaller
      working-directory: ./backend
      run: |
        pyinstaller --onefile --name backend-server run_server.py
    
    - name: Create Backend Release Folder
      run: |
        mkdir backend-release
        xcopy /E /I /Y backend\dist\backend-server.exe backend-release\
        xcopy /E /I /Y backend\data backend-release\data\
        echo @echo off > backend-release\start-backend.bat
        echo echo Starting Quran Reciter ID Backend Server... >> backend-release\start-backend.bat
        echo backend-server.exe >> backend-release\start-backend.bat
    
    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v3
      with:
        name: QuranReciterID-Backend
        path: backend-release/
        retention-days: 90
