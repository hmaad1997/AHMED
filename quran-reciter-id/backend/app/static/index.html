<!doctype html><html lang="ar" dir="rtl"><head>
<meta charset="utf-8"><title>من القارئ</title>
<link rel="icon" href="/static/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#021a19;--bg2:#042f2e;--card:#083c39;--border:#d9b35c26;--gold:#d9b35c;--gold2:#f0d78c;--fg:#eef4ea;--mut:#a9b8b6;--ok:#3ecf8e;--err:#f2545b}
*{box-sizing:border-box}html,body{margin:0;background:radial-gradient(1200px 800px at 80% -20%,#0f5349 0,var(--bg) 70%);color:var(--fg);font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:22px 28px 60px}
header{display:flex;gap:18px;align-items:center;padding:16px 22px;background:linear-gradient(135deg,#04302e,#083c39);border:1px solid var(--border);border-radius:22px;box-shadow:0 12px 40px #0006}
.logo{width:72px;height:72px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px var(--gold),0 0 24px #d9b35c55;background:#000}
h1{font-family:Amiri,serif;margin:0;font-size:34px;color:var(--gold2);letter-spacing:.5px}
.sub{color:var(--mut);font-size:14px;margin-top:2px}
.spacer{flex:1}
.status{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--mut)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mut)}
.dot.ok{background:var(--ok);box-shadow:0 0 10px var(--ok)}
.tabs{display:flex;gap:6px;margin:22px 0;flex-wrap:wrap}
.tab{padding:10px 20px;border-radius:14px;border:1px solid var(--border);background:#04302e80;color:var(--mut);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:.2s}
.tab:hover{color:var(--fg)}
.tab.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a1f1e;border-color:var(--gold)}
.panel{display:none;background:linear-gradient(180deg,#083c39,#052b29);border:1px solid var(--border);border-radius:22px;padding:26px;box-shadow:0 10px 40px #0008}
.panel.active{display:block}
.drop{border:2px dashed #d9b35c55;border-radius:18px;padding:44px 20px;text-align:center;cursor:pointer;transition:.2s;background:#0000001f}
.drop:hover,.drop.hover{border-color:var(--gold);background:#d9b35c14}
.drop h3{margin:0 0 6px;color:var(--gold2);font-family:Amiri,serif;font-size:24px}
.drop p{margin:4px 0;color:var(--mut);font-size:13px}
input[type=file]{display:none}
.btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a1f1e;border:0;padding:12px 26px;border-radius:12px;font-weight:700;font-family:inherit;cursor:pointer;font-size:15px;transition:.2s}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn.ghost{background:transparent;color:var(--gold2);border:1px solid var(--gold)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
input[type=text],textarea{width:100%;padding:11px 14px;background:#02201f;border:1px solid var(--border);border-radius:12px;color:var(--fg);font-family:inherit;font-size:14px}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--gold)}
label{display:block;color:var(--mut);font-size:13px;margin:10px 0 6px}
.files{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.files>div{background:#02201f;border:1px solid var(--border);padding:8px 14px;border-radius:10px;font-size:13px;display:flex;justify-content:space-between;color:var(--mut)}
.result{margin-top:22px;padding:22px;border-radius:18px;background:linear-gradient(135deg,#0f5349,#083c39);border:1px solid var(--gold);display:none}
.result.show{display:block}
.result.unknown{background:linear-gradient(135deg,#3a1f1f,#2a1414);border-color:var(--err)}
.rname{font-family:Amiri,serif;font-size:32px;color:var(--gold2);margin:0}
.reng{color:var(--mut);font-size:14px;margin:2px 0 14px}
.meter{height:8px;background:#02201f;border-radius:99px;overflow:hidden;margin:8px 0 12px}
.meter>span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .6s}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{padding:6px 12px;background:#02201fcc;border:1px solid var(--border);border-radius:99px;font-size:12px;color:var(--mut)}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:16px}
.card{background:#02201f;border:1px solid var(--border);padding:14px;border-radius:14px}
.card b{color:var(--gold2);font-family:Amiri,serif;font-size:18px;display:block;margin-bottom:4px}
.card small{color:var(--mut);font-size:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#083c39;border:1px solid var(--gold);color:var(--fg);padding:12px 20px;border-radius:12px;box-shadow:0 8px 30px #000a;z-index:99;display:none}
.toast.show{display:block}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #ffffff33;border-top-color:var(--gold2);border-radius:50%;animation:s 1s linear infinite;vertical-align:middle;margin-inline-end:8px}
@keyframes s{to{transform:rotate(360deg)}}
.mic{display:inline-flex;align-items:center;gap:8px}
.mic.rec .btn{background:linear-gradient(135deg,#f2545b,#f28088);color:#fff;animation:pulse 1.2s infinite}
@keyframes pulse{50%{filter:brightness(1.15)}}
</style></head><body><div class="wrap">
<header>
  <img class="logo" src="/static/logo.jpg" alt="من القارئ">
  <div><h1>من القارئ؟</h1><div class="sub">تطبيق التعرّف على قرّاء القرآن الكريم بالبصمة الصوتية</div></div>
  <div class="spacer"></div>
  <div class="status"><span class="dot" id="dot"></span><span id="stTxt">جارٍ الاتصال…</span></div>
</header>

<div class="tabs">
  <button class="tab active" data-t="id">🎙️ تعرّف على القارئ</button>
  <button class="tab" data-t="add">➕ إضافة قارئ</button>
  <button class="tab" data-t="lib">📚 المكتبة</button>
  <button class="tab" data-t="hist">🕒 السجل</button>
</div>

<section class="panel active" id="p-id">
  <div class="drop" id="dropId"><h3>اسحب ملف الصوت هنا</h3><p>أو اضغط للاختيار — MP3 / WAV / M4A / MP4 (10 ث على الأقل)</p><p id="fname" style="color:var(--gold2);margin-top:8px"></p></div>
  <input type="file" id="fileId" accept="audio/*,video/*">
  <div class="row">
    <button class="btn" id="btnId" disabled>🔍 حلّل البصمة الصوتية</button>
    <div class="mic" id="micWrap"><button class="btn ghost" id="btnMic">🎤 استماع مباشر (10 ث)</button></div>
  </div>
  <div class="result" id="res"></div>
</section>

<section class="panel" id="p-add">
  <div class="grid2">
    <div><label>اسم القارئ *</label><input type="text" id="rName" placeholder="مثال: عبد الباسط عبد الصمد"></div>
    <div><label>الدولة</label><input type="text" id="rCountry" placeholder="مصر"></div>
  </div>
  <label>نبذة</label><textarea id="rBio" rows="2"></textarea>
  <label>ملفات صوتية للتدريب (2 أو أكثر مفضّل)</label>
  <div class="drop" id="dropAdd"><h3>اسحب الملفات هنا</h3><p>أو اضغط للاختيار</p></div>
  <input type="file" id="fileAdd" accept="audio/*" multiple>
  <div class="files" id="addFiles"></div>
  <div class="row"><button class="btn" id="btnAdd" disabled>💾 حفظ القارئ</button></div>
</section>

<section class="panel" id="p-lib"><div class="row"><button class="btn ghost" onclick="loadLib()">🔄 تحديث</button><span id="libCnt" style="color:var(--mut)"></span></div><div class="list" id="lib"></div></section>
<section class="panel" id="p-hist"><div class="row"><button class="btn ghost" onclick="loadHist()">🔄 تحديث</button></div><div class="list" id="hist"></div></section>

</div><div class="toast" id="toast"></div>
<script>
const $=q=>document.querySelector(q);
const toast=(m,ok=true)=>{const t=$('#toast');t.textContent=m;t.style.borderColor=ok?'var(--gold)':'var(--err)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200)};
const api=(p,o)=>fetch(p,o).then(async r=>{const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.detail||j.error||('HTTP '+r.status));return j});
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#p-'+b.dataset.t).classList.add('active');if(b.dataset.t==='lib')loadLib();if(b.dataset.t==='hist')loadHist()});
function wire(drop,inp,cb){drop.onclick=()=>inp.click();['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('hover')}));['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('hover')}));drop.addEventListener('drop',e=>cb(e.dataTransfer.files));inp.addEventListener('change',e=>cb(e.target.files))}
let idFile=null;
wire($('#dropId'),$('#fileId'),f=>{idFile=f[0]||null;$('#fname').textContent=idFile?('📄 '+idFile.name):'';$('#btnId').disabled=!idFile});
async function doId(blob,name){const fd=new FormData();fd.append('audio_file',blob,name||blob.name||'a.wav');const res=$('#res');res.className='result show';res.innerHTML='<div><span class="spin"></span>جارٍ التحليل العميق (قد يستغرق ~40 ثانية)…</div>';try{const r=await api('/identify-reciter',{method:'POST',body:fd});renderRes(r)}catch(e){res.className='result show unknown';res.innerHTML='<p style="color:var(--err)">❌ '+e.message+'</p>'}}
$('#btnId').onclick=()=>idFile&&doId(idFile);
function renderRes(r){const res=$('#res');const pct=Math.round((r.confidence||0)*100);res.className='result show'+(r.is_unknown?' unknown':'');res.innerHTML=r.is_unknown?`<h2 class="rname" style="color:var(--err)">قارئ غير معروف</h2><p class="reng">لم نتمكن من مطابقة هذا الصوت مع قاعدة البيانات</p><div class="meter"><span style="width:${pct}%"></span></div><p style="color:var(--mut);font-size:13px">أعلى تشابه: ${pct}%</p>`:`<h2 class="rname">${r.reciter_name}</h2><p class="reng">${r.reciter_name_english||''}</p><div class="meter"><span style="width:${pct}%"></span></div><p style="color:var(--gold2);font-weight:600">الثقة: ${pct}% • تشابه: ${(r.similarity_score||0).toFixed(3)}</p><div class="chips">${r.country?'<span class="chip">🌍 '+r.country+'</span>':''}${r.recitation_style?'<span class="chip">🎼 '+r.recitation_style+'</span>':''}${r.birth_year?'<span class="chip">🗓 '+r.birth_year+(r.death_year?' — '+r.death_year:'')+'</span>':''}</div>${r.bio?'<p style="margin-top:14px;color:var(--fg);line-height:1.9">'+r.bio+'</p>':''}`}
// Live listen
let rec=null,chunks=[];
$('#btnMic').onclick=async()=>{const w=$('#micWrap'),b=$('#btnMic');if(rec){rec.stop();return}try{const s=await navigator.mediaDevices.getUserMedia({audio:true});rec=new MediaRecorder(s);chunks=[];rec.ondataavailable=e=>chunks.push(e.data);rec.onstop=()=>{const blob=new Blob(chunks,{type:'audio/webm'});s.getTracks().forEach(t=>t.stop());w.classList.remove('rec');b.textContent='🎤 استماع مباشر (10 ث)';rec=null;doId(blob,'live.webm')};rec.start();w.classList.add('rec');b.textContent='⏹ إيقاف التسجيل';setTimeout(()=>rec&&rec.state==='recording'&&rec.stop(),10000)}catch(e){toast('لا يمكن الوصول للميكروفون',false)}};
// Add reciter
let addFiles=[];
const renderAdd=()=>{$('#addFiles').innerHTML=addFiles.map((f,i)=>`<div><span>📄 ${f.name}</span><span style="cursor:pointer;color:var(--err)" onclick="rmAdd(${i})">✕</span></div>`).join('');$('#btnAdd').disabled=!($('#rName').value.trim()&&addFiles.length)};
window.rmAdd=i=>{addFiles.splice(i,1);renderAdd()};
wire($('#dropAdd'),$('#fileAdd'),f=>{addFiles.push(...Array.from(f));renderAdd()});
$('#rName').oninput=renderAdd;
$('#btnAdd').onclick=async()=>{const b=$('#btnAdd');b.disabled=true;b.innerHTML='<span class="spin"></span>حفظ…';try{const fd=new FormData();fd.append('name',$('#rName').value.trim());fd.append('country',$('#rCountry').value.trim());fd.append('bio',$('#rBio').value.trim());addFiles.forEach(f=>fd.append('audio_files',f));const r=await api('/reciters/add',{method:'POST',body:fd});toast('✅ تم حفظ القارئ ('+r.embeddings_added+' بصمة)');addFiles=[];$('#rName').value=$('#rCountry').value=$('#rBio').value='';renderAdd()}catch(e){toast(e.message,false)}b.innerHTML='💾 حفظ القارئ';renderAdd()};
async function loadLib(){const el=$('#lib');el.innerHTML='<p style="color:var(--mut)">جارٍ التحميل…</p>';try{const r=await api('/list-reciters');$('#libCnt').textContent='• '+r.total_reciters+' قارئ';el.innerHTML=r.reciters.map(x=>`<div class="card"><b>${x.name}</b><small>${x.name_english||''}</small><small style="display:block;margin-top:6px">🌍 ${x.country||'—'} • 🎼 ${x.recitation_style||'—'}</small></div>`).join('')||'<p style="color:var(--mut)">لا يوجد قرّاء بعد</p>'}catch(e){el.innerHTML='<p style="color:var(--err)">'+e.message+'</p>'}}
async function loadHist(){const el=$('#hist');el.innerHTML='<p style="color:var(--mut)">جارٍ التحميل…</p>';try{const r=await api('/history');const items=r.history||r.items||r;el.innerHTML=(Array.isArray(items)?items:[]).map(x=>`<div class="card"><b>${x.reciter_name||'—'}</b><small>${x.timestamp||x.date||''}</small><small style="display:block;margin-top:6px">ثقة: ${Math.round((x.confidence||0)*100)}%</small></div>`).join('')||'<p style="color:var(--mut)">لا يوجد سجل</p>'}catch(e){el.innerHTML='<p style="color:var(--err)">'+e.message+'</p>'}}
async function poll(){try{const r=await api('/model-status');if(r.ready||r.status==='ready'){$('#dot').classList.add('ok');$('#stTxt').textContent='النموذج جاهز'}else{$('#stTxt').textContent='تحميل النموذج… '+(r.progress||'');setTimeout(poll,2000)}}catch{setTimeout(poll,2500)}}poll();
</script></body></html>
