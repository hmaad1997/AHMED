services:
  - type: web
    name: quran-reciter-id
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./quran-reciter-id/Dockerfile
    dockerContext: ./quran-reciter-id
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 7860
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TORCH_HOME
        value: /tmp/torch
      - key: HF_HOME
        value: /tmp/hf
      - key: SKIP_ENRICHMENT
        value: "1"
